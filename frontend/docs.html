<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation - Bioinformatics Library</title>
  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="./dist/output.css">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Modern, highly-readable typography system */
    .markdown-body {
      font-size: 0.875rem; /* 14px */
      line-height: 1.75;
      color: #334155; /* slate-700 */
    }
    .markdown-body h1 {
      font-size: 1.75rem; /* 28px */
      font-weight: 750;
      color: #0f172a; /* slate-900 */
      margin-top: 2.25rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.625rem;
      letter-spacing: -0.02em;
    }
    .markdown-body h2 {
      font-size: 1.25rem; /* 20px */
      font-weight: 700;
      color: #1e293b; /* slate-800 */
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 0.375rem;
      letter-spacing: -0.01em;
    }
    .markdown-body h3 {
      font-size: 1rem; /* 16px */
      font-weight: 600;
      color: #334155; /* slate-700 */
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .markdown-body p {
      margin-bottom: 1.25rem;
    }
    .markdown-body ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .markdown-body ul li {
      margin-bottom: 0.5rem;
    }
    .markdown-body ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .markdown-body ol li {
      margin-bottom: 0.5rem;
    }
    .markdown-body pre {
      background-color: #f8fafc; /* slate-50 */
      border: 1px solid #e2e8f0;
      padding: 1rem;
      border-radius: 0.375rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      color: #334155;
      overflow-x: auto;
      margin-top: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .markdown-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      background-color: #f1f5f9;
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      color: #0f172a;
    }
    .markdown-body pre code {
      background-color: transparent;
      padding: 0;
      border-radius: 0;
      color: inherit;
      font-size: inherit;
    }
    .markdown-body table {
      width: 100%;
      text-align: left;
      border-collapse: collapse;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .markdown-body th {
      border-bottom: 2px solid #e2e8f0;
      padding: 0.75rem 1rem;
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .markdown-body td {
      border-bottom: 1px solid #e2e8f0;
      padding: 0.75rem 1rem;
      color: #475569;
    }
    .markdown-body blockquote {
      border-left: 4px solid #cbd5e1;
      background-color: #f8fafc;
      padding: 0.875rem 1.25rem;
      color: #475569;
      margin-top: 1.25rem;
      margin-bottom: 1.25rem;
      border-radius: 0 0.25rem 0.25rem 0;
    }
    .markdown-body blockquote p {
      margin-bottom: 0;
    }
    
    /* Centering and spacing display math blocks */
    .katex-display {
      margin: 1.5rem 0 !important;
      padding: 0.5rem 0;
      overflow-x: auto;
      overflow-y: hidden;
    }
    
    /* GitHub specific code block math hide markers */
    .markdown-body pre code.language-math {
      display: block;
      padding: 0.5rem;
      text-align: center;
      background: #fafafa;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen h-screen flex flex-col overflow-hidden">
  
  <!-- Header Bar -->
  <header class="bg-white border-b border-slate-200 py-3 px-6 flex justify-between items-center select-none z-50">
    <div class="flex items-center space-x-3">
      <a href="./index.html" class="flex items-center space-x-2 text-slate-500 hover:text-slate-800 transition-colors">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span class="text-xs font-semibold">Dashboard</span>
      </a>
      <span class="text-slate-350">/</span>
      <span class="text-sm font-bold tracking-tight text-slate-800">Documentation & Reference Docs</span>
    </div>
    <div class="flex items-center bg-slate-50 px-2.5 py-1 rounded-sm border border-slate-200">
      <span id="server-status-dot" class="h-2 w-2 rounded-full bg-slate-400 mr-2"></span>
      <span id="server-status-text" class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Checking...</span>
    </div>
  </header>

  <!-- Workspace Shell -->
  <div class="flex-grow flex h-[calc(100vh-45px)] overflow-hidden">
    
    <!-- Left Sidebar (Navigation) -->
    <aside class="w-80 bg-slate-55 border-r border-slate-200 p-4 flex flex-col justify-between overflow-y-auto select-none">
      <div class="space-y-6">
        
        <!-- Search bar -->
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Search Documentation</label>
          <input type="text" id="doc-search-input" class="w-full bg-white border border-slate-200 rounded-sm text-xs px-2.5 py-1.5 focus:outline-none focus:ring-1 focus:ring-slate-400 text-slate-850" placeholder="Filter topics..." />
        </div>

        <!-- Navigation Sections -->
        <nav class="space-y-5">
          <!-- Section: Alignments -->
          <div class="space-y-1">
            <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider px-2">Alignments</span>
            <div class="space-y-0.5">
              <button onclick="loadDoc('alignments/needleman_wunsch.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Needleman-Wunsch</button>
              <button onclick="loadDoc('alignments/smith_waterman.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Smith-Waterman</button>
              <button onclick="loadDoc('alignments/levenshtein_distance.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Levenshtein Distance</button>
              <button onclick="loadDoc('alignments/hamming_distance.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Hamming Distance</button>
              <button onclick="loadDoc('alignments/dot_plot.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Dot Plot Visualizer</button>
            </div>
          </div>

          <!-- Section: Genetics -->
          <div class="space-y-1">
            <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider px-2">Genetics</span>
            <div class="space-y-0.5">
              <button onclick="loadDoc('genetics/complement.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Complement Mapping</button>
              <button onclick="loadDoc('genetics/reverse_complement.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Reverse Complement</button>
              <button onclick="loadDoc('genetics/transcribe.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Transcription</button>
              <button onclick="loadDoc('genetics/translate.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Translation</button>
              <button onclick="loadDoc('genetics/find_motif.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Motif Finding</button>
            </div>
          </div>

          <!-- Section: File IO -->
          <div class="space-y-1">
            <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider px-2">File Data IO</span>
            <div class="space-y-0.5">
              <button onclick="loadDoc('io/fasta_parse.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">FASTA Parse</button>
              <button onclick="loadDoc('io/fasta_write.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">FASTA Export</button>
              <button onclick="loadDoc('io/validate_input.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Input Validation</button>
            </div>
          </div>

          <!-- Section: API -->
          <div class="space-y-1">
            <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider px-2">API Reference</span>
            <div class="space-y-0.5">
              <button onclick="loadDoc('api.md', this)" class="w-full text-left px-2.5 py-1.5 text-xs font-semibold rounded-sm hover:bg-slate-200 text-slate-600 hover:text-slate-850 cursor-pointer transition-colors">Developer API</button>
            </div>
          </div>
        </nav>
      </div>

      <!-- Sidebar footer status -->
      <div class="border-t border-slate-200 pt-3 text-[10px]">
        <a href="./index.html" class="font-bold text-slate-600 hover:text-slate-800 cursor-pointer">&larr; Back to Dashboard</a>
      </div>
    </aside>

    <!-- Right Panel (Content area) -->
    <main class="flex-grow overflow-y-auto bg-slate-100 p-6">
      <div class="bg-white border border-slate-200 rounded-sm shadow-sm p-8 markdown-body min-h-[90%] w-full max-w-4xl mx-auto">
        <!-- Injected Document Content -->
        <div id="doc-content">
          <div class="flex justify-center items-center h-64 text-slate-400 text-xs font-semibold">
            Loading documentation...
          </div>
        </div>
      </div>
    </main>

  </div>

  <script src="./app.js"></script>
  <script>
    // Document Search Filtering
    document.getElementById("doc-search-input").addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      document.querySelectorAll("aside nav button").forEach(btn => {
        const text = btn.textContent.toLowerCase();
        if (text.includes(query)) {
          btn.style.display = "block";
        } else {
          btn.style.display = "none";
        }
      });
    });

    // Keep sidebar link highlighting up-to-date
    function highlightActiveLink(btn) {
      document.querySelectorAll('aside nav button').forEach(b => {
        b.classList.remove('bg-slate-800', 'text-white', 'hover:bg-slate-900');
        b.classList.add('text-slate-600', 'hover:bg-slate-200', 'hover:text-slate-805');
      });
      if (btn) {
        btn.classList.remove('text-slate-600', 'hover:bg-slate-200', 'hover:text-slate-805');
        btn.classList.add('bg-slate-800', 'text-white', 'hover:bg-slate-900');
      }
    }

    async function loadDoc(docPath, btnElement) {
      const contentContainer = document.getElementById("doc-content");
      contentContainer.innerHTML = '<div class="flex justify-center items-center h-64 text-slate-400 text-xs font-semibold">Loading documentation...</div>';
      
      highlightActiveLink(btnElement);
      
      // Update hash in URL
      window.location.hash = docPath;
      
      try {
        const response = await fetch(`./docs/${docPath}`);
        if (!response.ok) throw new Error("Document not found");
        
        let markdownText = await response.text();
        
        // Custom parser extension for GitHub ```math code blocks
        // Convert ```math code blocks into standard LaTeX block format $$ so KaTeX auto-render can pick it up
        markdownText = markdownText.replace(/```math([\s\S]*?)```/g, function(match, formula) {
          return `$$\n${formula.trim()}\n$$`;
        });
        
        // Parse markdown to HTML using marked
        const html = marked.parse(markdownText);
        contentContainer.innerHTML = html;
        
        // Run KaTeX equations rendering
        renderMathInElement(contentContainer, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
        
      } catch (error) {
        contentContainer.innerHTML = `
          <div class="p-5 bg-rose-50 border border-rose-200 text-rose-700 text-xs rounded-sm">
            <strong>Error:</strong> Could not load documentation for <code>${docPath}</code>. Make sure the file exists and is accessible.
          </div>
        `;
      }
    }

    // Initialize document selection on page load
    window.addEventListener("DOMContentLoaded", () => {
      // Initialize active server indicator check
      if (typeof window.checkServerStatus === "function") {
        window.checkServerStatus();
      }
      
      // Read initial path from URL hash or default to Needleman-Wunsch
      const hashPath = window.location.hash.substring(1);
      if (hashPath) {
        // Find matching sidebar button
        const btn = Array.from(document.querySelectorAll('aside nav button')).find(b => {
          return b.getAttribute('onclick') && b.getAttribute('onclick').includes(hashPath);
        });
        loadDoc(hashPath, btn);
      } else {
        const defaultBtn = document.querySelector('aside nav button');
        loadDoc('alignments/needleman_wunsch.md', defaultBtn);
      }
    });
  </script>
</body>
</html>
