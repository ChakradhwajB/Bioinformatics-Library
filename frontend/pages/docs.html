  <script>
    // Document Search Filtering
    document.getElementById("doc-search-input").addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      document.querySelectorAll("aside nav button").forEach(btn => {
        const text = btn.textContent.toLowerCase();
        if (text.includes(query)) {
          btn.style.display = "block";
        } else {
          btn.style.display = "none";
        }
      });
    });

    // Keep sidebar link highlighting up-to-date
    function highlightActiveLink(btn) {
      document.querySelectorAll('aside nav button').forEach(b => {
        b.classList.remove('bg-slate-800', 'text-white', 'hover:bg-slate-900');
        b.classList.add('text-slate-600', 'hover:bg-slate-200', 'hover:text-slate-805');
      });
      if (btn) {
        btn.classList.remove('text-slate-600', 'hover:bg-slate-200', 'hover:text-slate-805');
        btn.classList.add('bg-slate-800', 'text-white', 'hover:bg-slate-900');
      }
    }

    // Quiz solutions storage
    window.quizSolutions = {};

    window.checkQuizAnswer = function(quizId) {
      const form = document.querySelector(`#${quizId} form`);
      const feedback = form.querySelector('.quiz-feedback');
      const selected = form.querySelector(`input[name="${quizId}-options"]:checked`);
      if (!selected) return;
      
      const solutions = window.quizSolutions[quizId];
      const selectedIndex = parseInt(selected.value);
      const chosenOpt = solutions[selectedIndex];
      
      feedback.classList.remove('hidden', 'bg-rose-50', 'text-rose-700', 'border-rose-200', 'bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
      feedback.classList.add('border');
      
      if (chosenOpt.isCorrect) {
        feedback.classList.add('bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
        feedback.innerHTML = `<strong>✨ Correct!</strong> ${chosenOpt.explanation || 'Great job!'}`;
      } else {
        feedback.classList.add('bg-rose-50', 'text-rose-700', 'border-rose-200');
        feedback.innerHTML = `<strong>❌ Incorrect.</strong> Try again! ${chosenOpt.explanation ? `<br/><span class="mt-1 block font-normal">${chosenOpt.explanation}</span>` : ''}`;
      }
      feedback.classList.remove('hidden');
    };

    function parseQuizzes(markdownText) {
      const quizRegex = />\s*\[!QUIZ\]\s*(.*?)\n((?:>\s*.*?\n?)*)/g;
      return markdownText.replace(quizRegex, function(match, title, body) {
        const lines = body.split('\n').map(l => l.replace(/^>\s*/, '').trim()).filter(Boolean);
        if (lines.length === 0) return '';
        
        const question = lines[0];
        const options = [];
        
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i];
          const optMatch = line.match(/^-\s*\[([ xX])\]\s*(.*?)(?:\s*\((.*?)\))?$/);
          if (optMatch) {
            options.push({
              isCorrect: optMatch[1].toLowerCase() === 'x',
              text: optMatch[2],
              explanation: optMatch[3] || ''
            });
          }
        }
        
        const quizId = 'quiz-' + Math.random().toString(36).substring(2, 9);
        let html = `
          <div class="my-6 p-5 border border-indigo-100 bg-indigo-50/15 rounded-md shadow-sm" id="${quizId}">
            <h4 class="text-xs font-bold uppercase tracking-wider text-indigo-700 mb-2">🧠 Quiz: ${title}</h4>
            <p class="text-xs font-semibold text-slate-800 mb-3">${question}</p>
            <form class="space-y-2" onsubmit="event.preventDefault(); window.checkQuizAnswer('${quizId}');">
        `;
        
        options.forEach((opt, index) => {
          html += `
            <label class="flex items-start space-x-2.5 p-2.5 rounded-sm border border-slate-200 bg-white hover:bg-slate-50 cursor-pointer text-xs font-semibold text-slate-700">
              <input type="radio" name="${quizId}-options" value="${index}" class="mt-0.5 accent-indigo-600" required />
              <span>${opt.text}</span>
            </label>
          `;
        });
        
        window.quizSolutions[quizId] = options;
        
        html += `
              <button type="submit" class="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-[10px] uppercase tracking-wider rounded-sm transition-colors cursor-pointer">Submit Answer</button>
              <div class="quiz-feedback mt-3 hidden text-[11px] font-semibold p-3 rounded-sm"></div>
            </form>
          </div>
        `;
        return html;
      });
    }

    async function loadDoc(docPath, btnElement) {
      const contentContainer = document.getElementById("doc-content");
      contentContainer.innerHTML = '<div class="flex justify-center items-center h-64 text-slate-400 text-xs font-semibold">Loading documentation...</div>';
      
      highlightActiveLink(btnElement);
      
      // Update hash in URL
      window.location.hash = docPath;
      
      try {
        const response = await fetch(`../docs/${docPath}`);
        if (!response.ok) throw new Error("Document not found");
        
        let markdownText = await response.text();
        
        // Custom parser extension for GitHub ```math code blocks
        // Convert ```math code blocks into standard LaTeX block format $$ so KaTeX auto-render can pick it up
        markdownText = markdownText.replace(/```math([\s\S]*?)```/g, function(match, formula) {
          return `$$\n${formula.trim()}\n$$`;
        });
        
        // Translate GitHub alerts blockquote style ([!IMPORTANT], [!NOTE], etc.)
        markdownText = markdownText.replace(/>\s*\[!IMPORTANT\]/gi, '> **⚠️ IMPORTANT:**');
        markdownText = markdownText.replace(/>\s*\[!NOTE\]/gi, '> **ℹ️ NOTE:**');
        markdownText = markdownText.replace(/>\s*\[!WARNING\]/gi, '> **⚠️ WARNING:**');
        markdownText = markdownText.replace(/>\s*\[!TIP\]/gi, '> **💡 TIP:**');
        
        // Parse quizzes
        markdownText = parseQuizzes(markdownText);
        
        // Parse markdown to HTML using marked
        const html = marked.parse(markdownText);
        contentContainer.innerHTML = html;
        
        // Resolve relative image paths relative to the document folder
        const dirPath = docPath.substring(0, docPath.lastIndexOf('/') + 1);
        contentContainer.querySelectorAll("img").forEach(img => {
          const src = img.getAttribute("src");
          if (src && !src.startsWith("http") && !src.startsWith("/") && !src.startsWith("file://")) {
            img.src = `../docs/${dirPath}${src}`;
          }
        });
        
        // Run KaTeX equations rendering
        renderMathInElement(contentContainer, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
        
      } catch (error) {
        contentContainer.innerHTML = `
          <div class="p-5 bg-rose-50 border border-rose-200 text-rose-700 text-xs rounded-sm">
            <strong>Error:</strong> Could not load documentation for <code class="font-mono text-[12px] font-bold text-indigo-600">${docPath}</code>. Make sure the file exists and is accessible.
          </div>
        `;
      }
    }

    // Initialize document selection on page load
    window.addEventListener("DOMContentLoaded", () => {
      // Initialize active server indicator check
      if (typeof window.checkServerStatus === "function") {
        window.checkServerStatus();
      }
      
      // Read initial path from URL hash or default to Needleman-Wunsch
      const hashPath = window.location.hash.substring(1);
      if (hashPath) {
        // Find matching sidebar button
        const btn = Array.from(document.querySelectorAll('aside nav button')).find(b => {
          return b.getAttribute('onclick') && b.getAttribute('onclick').includes(hashPath);
        });
        loadDoc(hashPath, btn);
      } else {
        const defaultBtn = document.querySelector('aside nav button');
        loadDoc('io/fasta_parse.md', defaultBtn);
      }
    });
  </script>

  <!-- Floating Sandbox Jump -->
  <button onclick="const m = document.querySelector('main'); m.scrollTo({ top: document.getElementById('sandbox-container').offsetTop, behavior: 'smooth' })" class="fixed bottom-6 right-8 bg-white/70 backdrop-blur-md border border-white/60 shadow-xl text-slate-700 text-[10px] font-bold uppercase tracking-wider px-4 py-2 rounded-full hover:bg-white hover:text-indigo-700 transition-all duration-300 z-50 flex items-center space-x-2 select-none group cursor-pointer">
    <span>Jump to Sandbox</span>
    <svg class="w-3 h-3 text-indigo-500 group-hover:-translate-y-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
  </button>
</body>
